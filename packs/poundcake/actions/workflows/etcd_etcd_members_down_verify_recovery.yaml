version: 1.0

description: Gather post-remediation etcd recovery evidence for etcd-members-down.

input:
  - alert_name
  - alert_group_name
  - severity
  - labels
  - annotations: {}
  - instance
  - job
  - cluster
  - order_id
  - req_id
  - evidence: {}

tasks:
  publish_context:
    action: core.noop
    next:
      - when: <% succeeded() %>
        publish:
          - status: succeeded
          - mutated: false
          - stage: recovery_review
          - message: "Recorded post-remediation review context for etcd-members-down; no automatic etcd mutation was attempted."
          - remediation_evidence:
              inherited: <% ctx().evidence %>
              alert_name: <% ctx().alert_name %>
              alert_group_name: <% ctx().alert_group_name %>
              severity: <% ctx().severity %>
              instance: <% ctx().instance %>
              job: <% ctx().job %>
              cluster: <% ctx().cluster %>
              labels: <% ctx().labels %>
              annotations: <% ctx().annotations %>
              operator_review_required: true
              automation_mutation_enabled: false

output:
  - status: <% ctx().status %>
  - mutated: <% ctx().mutated %>
  - stage: <% ctx().stage %>
  - message: <% ctx().message %>
  - evidence: <% ctx().remediation_evidence %>

name: host_down_remediation
runner_type: orquesta
entry_point: workflows/host_down_remediation.yaml
enabled: true
description: PoundCake host-down remediation workflow.
parameters:
  host:
    type: string
    required: true
    description: Hostname or instance label from the alert payload.
  alert_group_name:
    type: string
    required: false
    description: PoundCake alert group name.
  order_id:
    type: integer
    required: false
    description: PoundCake order id.

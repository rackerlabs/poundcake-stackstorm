#

# Default values for PoundCake
#
# Namespace behavior:
# - StackStorm resources render into stackstorm.namespace, which defaults to `stackstorm`
# - the bundled installer defaults `POUNDCAKE_STACKSTORM_NAMESPACE` to `stackstorm`
# - when stackstorm.namespace differs from the Helm release namespace, the chart creates it
#
# High-level chart shape:
# - PoundCake API + UI + workers
# - StackStorm and supporting infra
# - PoundCake DB can be embedded or shared-operator backed

replicaCount: 1

# Service selection:
# - poundcake.enabled=true renders PoundCake + StackStorm resources
poundcake:
  enabled: true

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Service account for PoundCake workloads and startup/bootstrap hooks.
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# StackStorm pods and startup hooks inherit the global podSecurityContext by default.
# Override here when the StackStorm image or shared RWX pack volumes need a different
# group mapping, for example the numeric GID that owns /opt/stackstorm/packs.
stackstormPodSecurityContext: {}

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

# UI configuration
# The UI is a separate container built and stored independently in GitHub container registry.
# It connects to the API service in the same namespace.
ui:
  enabled: true
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  # Example:
  #   kubernetes.io/ingress.class: nginx
  #   kubernetes.io/tls-acme: "true"
  hosts:
    - host: poundcake.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: poundcake-tls
  #    hosts:
  #      - poundcake.local

# Gateway API route attachment configuration.
# When enabled, PoundCake renders HTTPRoutes that attach to an existing Gateway.
# PoundCake does not create a Gateway resource.
gateway:
  enabled: false

  # Parent Gateway reference.
  # gatewayName should point to an existing shared Gateway.
  # gatewayNamespace is optional; if omitted, the HTTPRoute namespace is used.
  gatewayName: ""  # Example: <gateway-name>
  gatewayNamespace: ""  # Example: <gateway-namespace>

  # Existing listener section on the parent Gateway.
  # If omitted, route defaults are derived from gateway.listeners.* compatibility fields.
  listener:
    # Existing listener section name on parent Gateway (used as HTTPRoute parentRefs.sectionName)
    name: ""  # Example: <gateway-listener-name>

    # Optional default hostname used by both API/UI HTTPRoutes when gateway.hostnames is empty.
    hostname: ""  # Example: poundcake.example.com

    # Informational/compatibility fields.
    port: 443
    protocol: "HTTPS"
    tlsSecretName: ""  # Example: <gateway-tls-secret-name>
    allowedNamespaces: "All"
    updateIfExists: true

  # HTTPRoute hostnames. Applied to both API and UI routes.
  # If empty, listener.hostname is used, then legacy listeners.api/ui.hostname values.
  # - poundcake.example.com
  hostnames: []

  # Optional annotations for HTTPRoute
  annotations: {}
  # Example:
  #   application: gateway-api
  #   route: poundcake

  # Legacy compatibility fields used for path prefix and fallback section names.
  # If gatewayName is empty, gateway.name is used as parentRefs.name.
  className: envoyproxy
  name: poundcake-gateway
  listeners:
    # If api/ui share hostname+port+protocol, chart renders one listener (api)
    # and attaches both HTTPRoutes to that section.
    api:
      enabled: true
      hostname: api.poundcake.local
      port: 80
      protocol: HTTP
      # Increase request timeout for long-running repo sync operations such as bulk imports.
      requestTimeout: "300s"
      backendRequestTimeout: "300s"
      tls:
        mode: Terminate
        secretName: ""
      pathPrefix: /
    ui:
      enabled: true
      hostname: ui.poundcake.local
      port: 80
      protocol: HTTP
      tls:
        mode: Terminate
        secretName: ""
      pathPrefix: /

  # Session persistence configuration
  sessionPersistence:
    enabled: true
    timeout: "300s"
    cookieLifetimeType: "Permanent"  # or "Session"
    cookieName: "PoundcakeSession"
    uiCookieName: "PoundcakeUISession"

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}
# Set nodeSelector explicitly in environment values when workloads should target labeled worker nodes.

tolerations: []

affinity: {}

# PoundCake configuration
config:
  # Server settings
  host: "0.0.0.0"
  port: 8080
  debug: false

  # Logging
  logLevel: INFO
  logFormat: console

  # Metrics
  metricsEnabled: true
  metricsPath: /metrics

  # Remediation settings
  defaultTimeout: 300
  maxConcurrentRemediations: 10
  # Service plugins enabled at bootstrap. Production Helm does not infer external
  # adapter enablement or inject adapter credentials; operators manage adapter
  # connection records through PoundCake and credential-manager.
  enabledPlugins: "dummy"

# Alert suppression behavior in PoundCake API
suppressions:
  enabled: true
  lifecycleEnabled: true
  lifecycleIntervalSeconds: 30
  lifecycleBatchLimit: 25

# StackStorm integration (external chart managed by install script).
stackstorm:
  # Deploy StackStorm runtime services from this chart. Keep disabled for
  # PoundCake-only chart verification where the stackstorm plugin may still be
  # registered against an external or intentionally absent ST2 endpoint.
  enabled: true

  # Namespace for StackStorm runtime services managed by this chart. This keeps
  # StackStorm out of the PoundCake release namespace.
  namespace: "stackstorm"
  createNamespace: true

  # External StackStorm release name used for service/secret defaults.
  # Example: "stackstorm" -> stackstorm-st2api, stackstorm-st2auth, stackstorm-st2-apikeys.
  releaseName: ""

  # Connection configuration
  # Auto-generated from releaseName if empty; can be set explicitly.
  url: ""  # Example external: http://stackstorm-st2api.<namespace>.svc.cluster.local:9101
  authUrl: ""  # Example external: http://stackstorm-st2auth.<namespace>.svc.cluster.local:9100
  verifySsl: false

  # API key secret mapping.
  apiKeySecretName: ""
  apiKeySecretKey: "api-key"

  # Auto-discovery settings
  autoDiscover: true
  discoverAcrossNamespaces: true
  # Admin credentials for auto API key generation
  adminUser: "st2admin"
  adminPassword: ""
  # Optional override for the secret that stores StackStorm admin password.
  # Leave empty to use the StackStorm auth secret automatically.
  adminPasswordSecret: ""
  adminPasswordSecretKey: "ST2_AUTH_PASSWORD"
  # Resource naming for StackStorm backend dependencies managed by this chart.
  resourceNames:
    mongodb: "st2-mongodb"
    rabbitmq: "st2-rabbitmq"
    redis: "st2-redis"
  bootstrap:
    packs:
      kubernetes:
        enabled: false
        version: ""
        source:
          type: exchange
          name: kubernetes
          repoUrl: ""
        # Runtime settings for the installed kubernetes pack. Phase one does
        # not run a StackStorm bootstrap job; future service plugin setup will
        # own any StackStorm datastore or pack seeding.
        runtime:
          seedDatastore: true
          host: "https://cluster.local"
          verifySsl: false
        config:
          kubeconfig: ""
          caCert: ""
      openstack:
        enabled: false
        version: ""
        source:
          type: exchange
          name: openstack
          repoUrl: ""
        config:
          cloudsYaml: ""
          caCert: ""

# Redis configuration (used by StackStorm for coordination and optionally by PoundCake for caching)
# Uses Redis Operator (OpsTree Labs) to deploy Redis
redis:
  # Enable Redis for state management (required for replicaCount > 1)
  enabled: true

  # Deploy Redis as part of this chart (independent deployment)
  # Set to false to use an external Redis instance
  deploy: true

  # External Redis configuration (when deploy: false)
  external:
    # Redis connection URL (e.g., redis://my-redis:6379/0)
    url: "redis://redis.default.svc.cluster.local:6379/0"
    # Explicit host/port for components that do TCP health checks.
    host: "redis.default.svc.cluster.local"
    port: 6379
    # Password for external Redis
    password: ""
    existingSecret: ""
    secretKey: "redis-password"

  # Redis image configuration
  image:
    repository: quay.io/opstree/redis
    tag: v7.0.15
    pullPolicy: IfNotPresent

  # Redis authentication
  password: ""
  existingSecret: ""
  secretKey: "redis-password"

  auth:
    enabled: false
    password: ""

  # Persistence configuration
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  metrics:
    enabled: false
    image:
      repository: quay.io/opstree/redis-exporter
      tag: v1.44.0

  # State management settings
  alertTtlHours: 24  # How long to keep resolved orders
  lockTimeoutSeconds: 300  # Distributed lock timeout

# RabbitMQ configuration (used by StackStorm for task distribution and workflow coordination)
# Uses RabbitMQ Operator to deploy RabbitMQ cluster
rabbitmq:
  enabled: true
  # Use external RabbitMQ or deploy via operator
  external: false
  # Optional existing secret for RabbitMQ credentials
  # If set, this chart will use the secret and skip creating one.
  existingSecret: ""
  secretKeys:
    username: "username"
    password: "password"
  # External RabbitMQ settings (if external: true)
  host: "rabbitmq.default.svc.cluster.local"
  port: 5672
  username: "stackstorm"
  password: "stackstorm"
  vhost: "/"
  # Deployment settings (if external: false, uses RabbitMQ Operator)
  replicas: 1
  auth:
    username: stackstorm
    password: stackstorm
  persistence:
    size: 8Gi
    storageClassName: ""
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Alert-to-action mappings
# These will be mounted as ConfigMap
mappings:
  common.yaml: |
    orders:
      HighCPUUsage:
        description: "Remediate high CPU usage"
        handler: yaml_config
        actions:
          - name: identify_cpu_process
            action: core.remote
            description: "Identify CPU-intensive processes"
            parameters:
              hosts: "{{instance}}"
              cmd: "ps aux --sort=-%cpu | head -10"
            timeout: 60

      LowDiskSpace:
        description: "Clean up disk space"
        handler: yaml_config
        actions:
          - name: cleanup_logs
            action: core.remote
            description: "Clean up old log files"
            parameters:
              hosts: "{{instance}}"
              cmd: "find /var/log -name '*.gz' -mtime +7 -delete"
            timeout: 120

      ServiceDown:
        description: "Restart down services"
        handler: yaml_config
        actions:
          - name: restart_service
            action: linux.service
            parameters:
              host: "{{instance}}"
              service: "{{labels.service}}"
              action: restart
            timeout: 120

# ServiceMonitor for Prometheus Operator
serviceMonitor:
  enabled: true
  namespace: prometheus
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: kube-prometheus-stack

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Persistence for writable mappings (required for web UI edits)
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 100Mi
  # Legacy/infra storage options consumed by StackStorm-related templates.
  storageClassName: ""
  mariadb:
    size: 10Gi
    accessMode: ReadWriteOnce
    storageClassName: ""
  mongo:
    size: 10Gi
    accessMode: ReadWriteOnce
    storageClassName: ""
  rabbitmq:
    size: 5Gi
    accessMode: ReadWriteOnce
    storageClassName: ""
  redis:
    size: 2Gi
    accessMode: ReadWriteOnce
    storageClassName: ""
  config:
    size: 1Gi
    accessMode: ReadWriteMany
    storageClassName: ""
  stackstormSharedStorage:
    enabled: false
    accessMode: ReadWriteMany
    storageClassName: ""
    packVolumeSize: 5Gi
    virtualenvVolumeSize: 10Gi

longhorn:
  rwxStorageClass:
    create: false
    name: longhorn-rwx
    isDefaultClass: false
    numberOfReplicas: "3"
    staleReplicaTimeout: "30"
    fsType: ext4
    dataLocality: disabled
    migratable: "false"
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true

# Optional Kubernetes RBAC for external service plugins. These grants only
# authorize the PoundCake service account against cluster APIs; adapter runtime
# configuration and secrets must still be stored through credential-manager.
servicePluginRbac:
  prometheusRules:
    enabled: true

# Authentication configuration
auth:
  # Enable authentication for web UI and API
  enabled: true
  # Session timeout in seconds (default: 24 hours)
  sessionTimeout: 86400
  # OIDC state token lifetime in seconds for browser login providers.
  oidcStateTtl: 600
  # Secret name will be: <release-name>-poundcake-admin
  # Get password with: kubectl get secret <release-name>-poundcake-admin -n <namespace> -o jsonpath='{.data.password}' | base64 -d
  # Access page manages role bindings only. Provider enablement happens here at deploy time.

  local:
    # Keep the bootstrap superuser enabled as the recovery account.
    enabled: true

  activeDirectory:
    enabled: false
    serverUri: ""
    userBaseDn: ""
    bindDn: ""
    userFilter: "(&(objectClass=user)(sAMAccountName={username}))"
    groupAttribute: "memberOf"
    displayNameAttribute: "displayName"
    usernameAttribute: "sAMAccountName"
    subjectAttribute: "distinguishedName"
    useSsl: true
    validateTls: true
    groupNameRegex: "CN=([^,]+)"
    existingSecret: ""
    secretKeys:
      bindPassword: "bind-password"
    caBundle:
      existingSecret: ""
      key: "ca.crt"
      mountPath: "/run/secrets/poundcake-ad"
      fileName: "ca.crt"

  auth0:
    enabled: false
    shared:
      domain: ""
      audience: ""
      scope: "openid profile email"
      organization: ""
      connection: ""
      usernameClaim: "email"
      displayNameClaim: "name"
      groupsClaim: "groups"
      subjectClaim: "sub"
    ui:
      enabled: false
      clientId: ""
      callbackUrl: ""
      existingSecret: ""
      secretKeys:
        clientSecret: "client-secret"
    cli:
      enabled: false
      clientId: ""
      existingSecret: ""
      secretKeys:
        clientSecret: "client-secret"

  azureAd:
    enabled: false
    shared:
      tenant: ""
      audience: ""
      scope: "openid profile email"
      usernameClaim: "preferred_username"
      displayNameClaim: "name"
      groupsClaim: "groups"
      subjectClaim: "sub"
    ui:
      enabled: false
      clientId: ""
      callbackUrl: ""
      existingSecret: ""
      secretKeys:
        clientSecret: "client-secret"
    cli:
      enabled: false
      clientId: ""

# Database configuration (MySQL/MariaDB) for PoundCake API only.
database:
  # Database deployment mode for PoundCake:
  # - embedded: deploy in-chart poundcake-mariadb Deployment/Service/PVC
  # - shared_operator: use an existing MariaDB operator server and create PoundCake DB/User/Grant CRs
  mode: embedded

  sharedOperator:
    # MariaDB server/service name used when mode=shared_operator.
    serverName: ""
    # Namespace where the MariaDB server CR/service lives. Empty defaults to release namespace.
    namespace: ""
    # Create PoundCake Database/User/Grant CR resources against shared server.
    provisionResources: true

  # Database connection URL
  # Format: mysql+pymysql://user:password@host:port/database
  url: ""
  # Reference to existing secret containing database URL
  existingSecret: ""
  secretKey: "database-url"

# MariaDB Operator integration
# When enabled, PoundCake will create MariaDB resources using the mariadb-operator CRDs
# Requires mariadb-operator to be installed: https://github.com/mariadb-operator/mariadb-operator
mariadbOperator:
  # Enable MariaDB Operator integration
  # When true, the chart will check for the operator and create MariaDB CRDs
  enabled: true

  # Namespace to deploy MariaDB resources (defaults to release namespace)
  namespace: ""

  # MariaDB server configuration
  server:
    # Name of the MariaDB instance (defaults to release name)
    name: ""
    # MariaDB version
    image:
      repository: mariadb
      tag: "11.4"
      pullPolicy: IfNotPresent
    # Root password (auto-generated if not provided)
    rootPassword: ""
    # Use existing secret for root password
    rootPasswordSecret: ""
    rootPasswordSecretKey: "password"
    # Storage configuration
    storage:
      size: 10Gi
      storageClassName: ""
    # Resource limits
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Number of replicas (1 for standalone, 3+ for Galera)
    replicas: 1

  # Database configuration
  database:
    # Database name to create
    name: poundcake

  # User configuration
  user:
    # Max connections for this user
    maxUserConnections: 20

# MongoDB configuration (shared by external StackStorm and PoundCake)
# StackStorm uses this for the st2 database.
mongodb:
  # Enable MongoDB deployment
  enabled: true

  # Use external MongoDB or deploy as part of the chart
  external: false

  # External MongoDB settings (if external: true)
  host: "mongodb.default.svc.cluster.local"
  port: 27017
  database: "stackstorm"
  username: "stackstorm"
  password: ""
  # Reference to existing secret containing MongoDB credentials
  existingSecret: ""
  usernameKey: "mongodb-username"
  passwordKey: "mongodb-password"

  # MongoDB deployment settings (if external: false)
  image:
    repository: mongo
    tag: "7.0.28"  # MongoDB 7.0.28 (fully supported by StackStorm 3.9.0)
    pullPolicy: IfNotPresent

  # Authentication settings
  auth:
    enabled: true
    rootPassword: ""  # Auto-generated if not provided
    # Primary user for StackStorm
    username: "stackstorm"
    password: "stackstorm"
    database: "st2"

  # Storage configuration (increased for both StackStorm + PoundCake data)
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: ""

  # Resource limits
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

  # Service configuration
  service:
    type: ClusterIP
    port: 27017

# Prep chef service configuration
# Polls API and converts new orders into dishes.
prepChef:
  enabled: true
  replicaCount: 1
  interval: 5
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Timer service configuration
# Monitoring service that tracks dish execution status in StackStorm
timer:
  enabled: true
  replicaCount: 1
  interval: 10
  slaBufferPercent: 0.2
  incidentReconcileIntervalSeconds: 30
  incidentReconcileLimit: 25
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Dishwasher service configuration
# Periodic sync job that reconciles StackStorm content/state.
dishwasher:
  enabled: true
  replicaCount: 1
  interval: 300
  defaultDuration: 60
  defaultTimeout: 300
  pruneMissing: false
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Bootstrap runtime configuration
# Startup orchestration jobs are defined in stackstorm-startup-order-jobs.yaml.
bootstrap:
  ingredientsDir: /app/bootstrap/ingredients
  recipesDir: /app/bootstrap/recipes
  remoteSyncEnabled: true
  # Remote sync only runs when a repo URL is explicitly configured.
  rulesRepoUrl: ""
  rulesBranch: main
  rulesPath: alerts
  # One-shot job that mirrors poundcake-bootstrap (dishwasher in bootstrap mode).
  poundcakeBootstrap:
    defaultDuration: 60
    defaultTimeout: 300
    pruneMissing: false

# StackStorm actionrunner runtime configuration
stackstormActionrunner:
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  pvcPatchRbac:
    enabled: true
  workloadRecycleRbac:
    enabled: true

poundcakeImage:
  repository: ghcr.io/rackerlabs/poundcake
  tag: ""
  # Optional immutable image digest (sha256:...); overrides tag when set.
  digest: ""
  pullPolicy: Always
  pullSecrets: []
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

uiImage:
  repository: ghcr.io/rackerlabs/poundcake-ui
  tag: ""
  pullPolicy: Always
  containerPort: 8080
  nginxAccessLog: "off"
  runtimeWritablePaths:
    enabled: true
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

stackstormImage:
  repository: stackstorm/st2
  tag: "3.9.0"
  pullPolicy: IfNotPresent
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

utilitySecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

images:
  mariadb: mariadb:11.6
  mongodb: mongo:7.0
  rabbitmq: rabbitmq:3.13-management
  redis: redis:7.4-alpine
  alpine: alpine:3.19
  busybox: busybox:1.36
  kubectl: bitnami/kubectl:latest

stackstormApi:
  readiness:
    initialDelaySeconds: 5

poundcakeApi:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    initialDelaySeconds: 40
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  ticketing:
    catchAllRecipeName: "fallback-recipe"
    rackspaceConfirmedSolvedStatus: "confirmed solved"

secrets:
  # REQUIRED: Provide these values or they will be randomly generated on install
  dbRootPassword: ""
  dbName: poundcake
  dbMigratorUser: poundcake_migrator
  dbMigratorPassword: ""
  dbApiUser: poundcake_api
  dbApiPassword: ""
  dbCredentialManagerUser: poundcake_credential_manager
  dbCredentialManagerPassword: ""
  dbWorkerReaderUser: poundcake_worker_reader
  dbWorkerReaderPassword: ""
  dbReadonlyUser: poundcake_readonly
  dbReadonlyPassword: ""
  pluginCredentialEncryptionKey: ""
  webhookBearerToken: ""
  mongoRootPassword: ""
  mongoUsername: stackstorm
  mongoPassword: ""
  rabbitmqUser: stackstorm
  rabbitmqPassword: ""
  st2AuthUser: st2admin
  st2AuthPassword: ""
  packSyncToken: ""

stackstormPackSync:
  enabled: false
  endpoint: ""
  pollIntervalSeconds: 5
  bootstrapPollIntervalSeconds: 2
  timeoutSeconds: 10

services:
  api:
    type: ClusterIP
    port: 8000
    publishNotReadyAddresses: true
  ui:
    type: ClusterIP
    port: 80
  stackstormApi:
    type: ClusterIP
    port: 9101
  stackstormAuth:
    type: ClusterIP
    port: 9100
  stackstormStream:
    type: ClusterIP
    port: 9102
  stackstormWeb:
    type: ClusterIP
    port: 8080

stackstormComponents:
  register:
    enabled: false
  stream:
    enabled: true
  web:
    enabled: false
  client:
    enabled: true

stackstormServices:
  mongodb:
    enabled: true
  rabbitmq:
    enabled: true
  redis:
    enabled: true
  auth:
    enabled: true
  api:
    enabled: true
  actionrunner:
    enabled: true
  rulesengine:
    enabled: true
  workflowengine:
    enabled: true
  scheduler:
    enabled: true
  notifier:
    enabled: false
  garbagecollector:
    enabled: true
  timersengine:
    enabled: false
  sensorcontainer:
    enabled: false
  register:
    enabled: false
  stream:
    enabled: true
  web:
    enabled: false
  client:
    enabled: true

intervals:
  prepChef: "5"
  timer: "10"
  dishwasher: "300"
  prepInterval: "5"

logFormat: console

# Default resource requests and limits (can be overridden per component)
defaultResources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Container security context for infrastructure services.
# Stateful images may need writable root filesystem for sockets/temp files.
infraSecurityContext:
  mariadb:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  mongodb:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  rabbitmq:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  redis:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

startupHooks:
  gateLogging:
    enabled: true
    intervalSeconds: 30
    prefix: "[gate]"
  parallelWait:
    enabled: true
    failFast: true
    timeout: 15m
  cleanup:
    enabled: true
    deleteSuccessful: true
    deleteFailed: false
    ttlSecondsAfterFinished: 300

# Pod disruption budget settings
pdb:
  enabled: true

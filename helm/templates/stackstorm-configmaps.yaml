{{- if .Values.stackstorm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: stackstorm-config
  namespace: {{ include "poundcakeStackstorm.stackstormNamespace" . }}
  labels:
    {{- include "poundcakeStackstorm.labels" . | nindent 4 }}
data:
  st2.conf.template: |
{{ .Files.Get "files/st2-config/st2.conf.template" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stackstorm-scripts
  namespace: {{ include "poundcakeStackstorm.stackstormNamespace" . }}
  labels:
    {{- include "poundcakeStackstorm.labels" . | nindent 4 }}
data:
  st2-entrypoint.sh: |
{{ .Files.Get "files/st2-init/st2-entrypoint.sh" | indent 4 }}
  stackstorm-pack-sync.sh: |
{{ .Files.Get "files/st2-init/stackstorm-pack-sync.sh" | indent 4 }}
  install-third-party-packs.sh: |
{{ .Files.Get "files/st2-init/install-third-party-packs.sh" | indent 4 }}
  automated-setup.sh: |
{{ .Files.Get "files/scripts/automated-setup.sh" | indent 4 }}
  mongodb-init.sh: |
{{ .Files.Get "files/mongodb-init/01-create-st2-user.sh" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stackstorm-poundcake-pack
  namespace: {{ include "poundcakeStackstorm.stackstormNamespace" . }}
  labels:
    {{- include "poundcakeStackstorm.labels" . | nindent 4 }}
data:
  pack.yaml: |
    name: poundcake
    description: PoundCake-owned StackStorm automation content
    version: 0.1.0
    author: Rackspace
    email: noreply@rackspace.com
  poundcake_profiles.json: |
{{ .Files.Get "files/packs/poundcake/poundcake_profiles.json" | indent 4 }}
{{- range $path, $_ := .Files.Glob "files/packs/poundcake/actions/*.yaml" }}
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- range $path, $_ := .Files.Glob "files/packs/poundcake/actions/workflows/*.yaml" }}
  {{ printf "%s_workflow.yaml" (trimSuffix ".yaml" (base $path)) }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}

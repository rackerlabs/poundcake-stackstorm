apiVersion: batch/v1
kind: Job
metadata:
  name: stackstorm-bootstrap
  namespace: {{ include "poundcakeStackstorm.stackstormNamespace" . }}
  labels:
    app.kubernetes.io/component: stackstorm-bootstrap
    {{- include "poundcakeStackstorm.labels" . | nindent 4 }}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: {{ .Values.startupHooks.cleanup.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: stackstorm-bootstrap
        {{- include "poundcakeStackstorm.logLabelsForComponent" (dict "component" "stackstorm-bootstrap") | nindent 8 }}
        {{- include "poundcakeStackstorm.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- include "poundcakeStackstorm.podPlacement" . | nindent 6 }}
      serviceAccountName: poundcake-stackstorm-startup
      restartPolicy: OnFailure
      initContainers:
        - name: wait-edge
          image: {{ .Values.images.kubectl }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -ec
            - |
              NS="{{ include "poundcakeStackstorm.stackstormNamespace" . }}"
              {{- include "poundcakeStackstorm.gateLogHelpers" . | nindent 14 }}
              gate_log_wait_start "wait-stage6-edge" "secret stackstorm-startup-markers/stackstorm_edge_ready"
              until [ "$(kubectl -n "${NS}" get secret stackstorm-startup-markers -o jsonpath='{.data.stackstorm_edge_ready}' 2>/dev/null)" = "dHJ1ZQ==" ]; do
                gate_log_wait_tick "wait-stage6-edge" "secret stackstorm-startup-markers/stackstorm_edge_ready"
                sleep 2
              done
              gate_log_wait_ready "wait-stage6-edge"
        - name: automated-setup
          image: {{ .Values.stackstormImage.repository }}:{{ .Values.stackstormImage.tag }}
          imagePullPolicy: {{ .Values.stackstormImage.pullPolicy }}
          securityContext:
            {{- toYaml .Values.stackstormImage.securityContext | nindent 12 }}
          envFrom:
            - secretRef:
                name: stackstorm-secrets
          env:
            - name: APP_CONFIG_DIR
              value: /work
            - name: ST2_API_URL
              value: {{ include "poundcakeStackstorm.stackstormApiUrl" . | quote }}
            - name: ST2_AUTH_URL
              value: {{ include "poundcakeStackstorm.stackstormAuthUrl" . | quote }}
            - name: ST2_CLIENT_AUTO_AUTH
              value: "true"
            - name: ST2_STREAM_URL
              value: {{ include "poundcakeStackstorm.stackstormStreamUrl" . | quote }}
          command:
            - /bin/bash
            - /st2-entrypoint.sh
          args:
            - /bin/bash
            - -ec
            - |
              mkdir -p /work
              if [ -s /app/config/st2_api_key ]; then
                cp /app/config/st2_api_key /work/st2_api_key
              fi
              /bin/bash /automated-setup.sh
          volumeMounts:
            - name: stackstorm-config
              mountPath: /etc/st2/st2.conf.template
              subPath: st2.conf.template
            - name: scripts
              mountPath: /st2-entrypoint.sh
              subPath: st2-entrypoint.sh
            - name: scripts
              mountPath: /automated-setup.sh
              subPath: automated-setup.sh
            - name: scripts
              mountPath: /install-third-party-packs.sh
              subPath: install-third-party-packs.sh
            - name: packs
              mountPath: /opt/stackstorm/packs/poundcake
            - name: app-config
              mountPath: /app/config
            - name: generated-config
              mountPath: /work
      containers:
        - name: publish-api-key
          image: {{ .Values.images.kubectl }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -ec
            - |
              NS="{{ include "poundcakeStackstorm.stackstormNamespace" . }}"
              if [ ! -s /work/st2_api_key ]; then
                echo "Generated StackStorm API key is missing."
                exit 1
              fi
              key="$(cat /work/st2_api_key)"
              kubectl -n "${NS}" patch secret stackstorm-apikeys --type merge \
                -p "{\"stringData\":{\"st2_api_key\":\"${key}\"}}"
              kubectl -n "${NS}" patch secret stackstorm-startup-markers --type merge \
                -p '{"stringData":{"stackstorm_bootstrap_ready":"true"}}'
          volumeMounts:
            - name: generated-config
              mountPath: /work
      volumes:
        - name: stackstorm-config
          configMap:
            name: stackstorm-config
        - name: scripts
          configMap:
            name: stackstorm-scripts
            defaultMode: 0755
        - name: packs
          configMap:
            name: stackstorm-poundcake-pack
            items:
              - key: pack.yaml
                path: pack.yaml
              - key: poundcake_profiles.json
                path: poundcake_profiles.json
{{- range $path, $_ := .Files.Glob "files/packs/poundcake/actions/*.yaml" }}
              - key: {{ base $path }}
                path: actions/{{ base $path }}
{{- end }}
{{- range $path, $_ := .Files.Glob "files/packs/poundcake/actions/workflows/*.yaml" }}
              - key: {{ printf "%s_workflow.yaml" (trimSuffix ".yaml" (base $path)) }}
                path: actions/workflows/{{ base $path }}
{{- end }}
        - name: app-config
          projected:
            sources:
              - secret:
                  name: stackstorm-startup-markers
                  optional: true
              - secret:
                  name: stackstorm-apikeys
                  optional: true
        - name: generated-config
          emptyDir: {}
{{- end }}

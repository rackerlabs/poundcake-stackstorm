{{- if .Values.stackstorm.enabled }}
{{- include "poundcakeStackstorm.validateStackstormServiceSet" . -}}
{{- if eq (include "poundcakeStackstorm.stackstormServiceEnabled" (dict "root" . "name" "register")) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stackstorm-register
  labels:
    app.kubernetes.io/component: stackstorm-register
    {{- include "poundcakeStackstorm.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: stackstorm-register
      {{- include "poundcakeStackstorm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/poundcake-secrets: {{ include "poundcakeStackstorm.secretChecksumMaterial" . | sha256sum }}
      labels:
        app.kubernetes.io/component: stackstorm-register
        {{- include "poundcakeStackstorm.logLabelsForComponent" (dict "component" "stackstorm-register") | nindent 8 }}
        {{- include "poundcakeStackstorm.selectorLabels" . | nindent 8 }}
    spec:
      {{- $stackstormPodSecurityContext := include "poundcakeStackstorm.stackstormPodSecurityContext" . }}
      {{- if $stackstormPodSecurityContext }}
      securityContext:
        {{- $stackstormPodSecurityContext | nindent 8 }}
      {{- end }}
      {{- include "poundcakeStackstorm.podPlacement" . | nindent 6 }}
      initContainers:
        - name: wait-stage2
          image: {{ .Values.images.busybox }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - sh
            - -ec
            - |
              {{- include "poundcakeStackstorm.gateLogHelpers" . | nindent 14 }}
              gate_wait_for_true_file "/app/config/stackstorm_mongodb_user_ready" "wait-stage2-mongodb-user" "marker stackstorm_mongodb_user_ready"
              gate_wait_for_true_file "/app/config/stackstorm_infra_ready" "wait-stage2-infra" "marker stackstorm_infra_ready"
          volumeMounts:
            - name: app-config
              mountPath: /app/config
        {{- if eq (include "poundcakeStackstorm.stackstormThirdPartyPacksEnabled" .) "true" }}
{{ include "poundcakeStackstorm.stackstormThirdPartyPackInitContainer" . | indent 8 }}
        {{- end }}
      containers:
        - name: stackstorm-register
          image: {{ .Values.stackstormImage.repository }}:{{ .Values.stackstormImage.tag }}
          imagePullPolicy: {{ .Values.stackstormImage.pullPolicy }}
          securityContext:
            {{- toYaml .Values.stackstormImage.securityContext | nindent 12 }}
          envFrom:
            - secretRef:
                name: stackstorm-secrets
          command: ["/bin/bash", "/st2-entrypoint.sh"]
          args:
            - /bin/bash
            - -ec
            - |
              while true; do
                st2-register-content --register-all --register-fail-on-failure --config-file /tmp/st2/st2.conf || true
                sleep 300
              done
          volumeMounts:
            - name: stackstorm-config
              mountPath: /etc/st2/st2.conf.template
              subPath: st2.conf.template
            - name: scripts
              mountPath: /st2-entrypoint.sh
              subPath: st2-entrypoint.sh
            - name: packs
              mountPath: /opt/stackstorm/packs/poundcake
            {{- if eq (include "poundcakeStackstorm.stackstormThirdPartyPacksEnabled" .) "true" }}
{{ include "poundcakeStackstorm.stackstormThirdPartyPackVolumeMounts" . | indent 12 }}
            {{- end }}
            - name: app-config
              mountPath: /app/config
        {{- if .Values.stackstormPackSync.enabled }}
        - name: stackstorm-pack-sync
          image: {{ .Values.stackstormImage.repository }}:{{ .Values.stackstormImage.tag }}
          imagePullPolicy: {{ .Values.stackstormImage.pullPolicy }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command: ["/bin/bash", "/stackstorm-pack-sync.sh"]
          env:
            - name: POUNDCAKE_PACK_SYNC_URL
              value: {{ .Values.stackstormPackSync.endpoint | quote }}
            - name: POUNDCAKE_PACK_SYNC_POLL_INTERVAL
              value: {{ .Values.stackstormPackSync.pollIntervalSeconds | quote }}
            - name: POUNDCAKE_PACK_SYNC_BOOTSTRAP_INTERVAL
              value: {{ .Values.stackstormPackSync.bootstrapPollIntervalSeconds | quote }}
            - name: POUNDCAKE_PACK_SYNC_TIMEOUT
              value: {{ .Values.stackstormPackSync.timeoutSeconds | quote }}
            - name: PACK_SYNC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stackstorm-secrets
                  key: PACK_SYNC_TOKEN
          volumeMounts:
            - name: packs
              mountPath: /opt/stackstorm/packs/poundcake
            - name: scripts
              mountPath: /stackstorm-pack-sync.sh
              subPath: stackstorm-pack-sync.sh
        {{- end }}
      volumes:
        - name: stackstorm-config
          configMap:
            name: stackstorm-config
        - name: scripts
          configMap:
            name: stackstorm-scripts
            defaultMode: 0755
        - name: packs
          configMap:
            name: stackstorm-poundcake-pack
            items:
              - key: pack.yaml
                path: pack.yaml
              - key: host_down_remediation.yaml
                path: actions/host_down_remediation.yaml
              - key: host_down_remediation_workflow.yaml
                path: actions/workflows/host_down_remediation.yaml
        {{- if eq (include "poundcakeStackstorm.stackstormThirdPartyPacksEnabled" .) "true" }}
{{ include "poundcakeStackstorm.stackstormThirdPartyPackVolumes" . | indent 8 }}
        {{- end }}
        - name: app-config
          projected:
            sources:
              - secret:
                  name: stackstorm-startup-markers
                  optional: true
              - secret:
                  name: stackstorm-apikeys
                  optional: true
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stackstorm-auth
  labels:
    app.kubernetes.io/component: stackstorm-auth
    {{- include "poundcakeStackstorm.labels" . | nindent 4 }}
spec:

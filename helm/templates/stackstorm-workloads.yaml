      labels:
        app.kubernetes.io/component: stackstorm-client
        {{- include "poundcakeStackstorm.logLabelsForComponent" (dict "component" "stackstorm-client") | nindent 8 }}
        {{- include "poundcakeStackstorm.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- include "poundcakeStackstorm.podPlacement" . | nindent 6 }}
      initContainers:
        - name: wait-stage4
          image: {{ .Values.images.busybox }}
          securityContext:
            {{- toYaml .Values.utilitySecurityContext | nindent 12 }}
          command:
            - sh
            - -ec
            - |
              {{- include "poundcakeStackstorm.gateLogHelpers" . | nindent 14 }}
              gate_wait_for_true_file "/app/config/stackstorm_controlplane_ready" "wait-stage4-controlplane" "marker stackstorm_controlplane_ready"
          volumeMounts:
            - name: app-config
              mountPath: /app/config
        {{- if eq (include "poundcakeStackstorm.stackstormThirdPartyPacksEnabled" .) "true" }}
{{ include "poundcakeStackstorm.stackstormThirdPartyPackInitContainer" . | indent 8 }}
        {{- end }}
      containers:
        - name: stackstorm-client
          image: {{ .Values.stackstormImage.repository }}:{{ .Values.stackstormImage.tag }}
          imagePullPolicy: {{ .Values.stackstormImage.pullPolicy }}
          securityContext:
            {{- toYaml .Values.stackstormImage.securityContext | nindent 12 }}
          envFrom:
            - secretRef:
                name: stackstorm-secrets
          env:
            - name: ST2_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stackstorm-apikeys
                  key: st2_api_key
                  optional: true
            - name: ST2_API_URL
              value: {{ include "poundcakeStackstorm.stackstormApiUrl" . | quote }}
            - name: ST2_AUTH_URL
              value: {{ include "poundcakeStackstorm.stackstormAuthUrl" . | quote }}
            - name: ST2_API_KEY_FILE
              value: /app/config/st2_api_key
            - name: ST2_CLIENT_AUTO_AUTH
              value: "true"
            - name: ST2_STREAM_URL
              value: {{ include "poundcakeStackstorm.stackstormStreamUrl" . | quote }}
          command: ["/bin/bash", "/st2-entrypoint.sh"]
          args: ["sh", "-c", "echo 'stackstorm-client ready' && tail -f /dev/null"]
          volumeMounts:
            - name: stackstorm-config
              mountPath: /etc/st2/st2.conf.template
              subPath: st2.conf.template
            - name: scripts
              mountPath: /st2-entrypoint.sh
              subPath: st2-entrypoint.sh
            {{- if eq (include "poundcakeStackstorm.stackstormThirdPartyPacksEnabled" .) "true" }}
{{ include "poundcakeStackstorm.stackstormThirdPartyPackVolumeMounts" . | indent 12 }}
            {{- end }}
            - name: app-config
              mountPath: /app/config
      volumes:
        - name: stackstorm-config
          configMap:
            name: stackstorm-config
        - name: scripts
          configMap:
            name: stackstorm-scripts
            defaultMode: 0755
        {{- if eq (include "poundcakeStackstorm.stackstormThirdPartyPacksEnabled" .) "true" }}
{{ include "poundcakeStackstorm.stackstormThirdPartyPackVolumes" . | indent 8 }}
        {{- end }}
        - name: app-config
          projected:
            sources:
              - secret:
                  name: stackstorm-startup-markers
                  optional: true
              - secret:
                  name: stackstorm-apikeys
                  optional: true
{{- end }}
{{- end }}

{{- if and .Values.stackstorm.enabled .Values.stackstorm.enabled (eq (include "poundcakeStackstorm.stackstormServiceEnabled" (dict "root" . "name" "actionrunner")) "true") }}
{{- $cfg := .Values.stackstormActionrunner | default dict }}
{{- $serviceAccount := $cfg.serviceAccount | default dict }}
{{- $createServiceAccount := true }}
{{- if hasKey $serviceAccount "create" }}
{{- $createServiceAccount = $serviceAccount.create }}
{{- end }}
{{- $pvcPatchRbac := $cfg.pvcPatchRbac | default dict }}
{{- $enablePvcPatchRbac := true }}
{{- if hasKey $pvcPatchRbac "enabled" }}
{{- $enablePvcPatchRbac = $pvcPatchRbac.enabled }}
{{- end }}
{{- $workloadRecycleRbac := $cfg.workloadRecycleRbac | default dict }}
{{- $enableWorkloadRecycleRbac := true }}
{{- if hasKey $workloadRecycleRbac "enabled" }}
{{- $enableWorkloadRecycleRbac = $workloadRecycleRbac.enabled }}
{{- end }}
{{- $renderRole := or $enablePvcPatchRbac $enableWorkloadRecycleRbac }}
{{- $rbacName := printf "%s-cluster" (include "poundcakeStackstorm.stackstormActionrunnerServiceAccountName" .) | trunc 63 | trimSuffix "-" }}
{{- if $createServiceAccount }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "poundcakeStackstorm.stackstormActionrunnerServiceAccountName" . }}
  namespace: {{ include "poundcakeStackstorm.stackstormNamespace" . }}
  labels:
    {{- include "poundcakeStackstorm.labels" . | nindent 4 }}
  {{- with $serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if $renderRole }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $rbacName }}
  labels:
    {{- include "poundcakeStackstorm.labels" . | nindent 4 }}
rules:
{{- if $enablePvcPatchRbac }}
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "patch"]
{{- end }}
{{- if $enableWorkloadRecycleRbac }}
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $rbacName }}
  labels:
    {{- include "poundcakeStackstorm.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "poundcakeStackstorm.stackstormActionrunnerServiceAccountName" . }}
    namespace: {{ include "poundcakeStackstorm.stackstormNamespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $rbacName }}
{{- end }}
{{- end }}
